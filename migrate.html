<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Миграция данных Firebase</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 30px; max-width: 800px; margin: 0 auto; }
h1 { color: #38bdf8; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
pre { background: #0f172a; padding: 12px; border-radius: 8px; overflow: auto; max-height: 300px; font-size: 12px; white-space: pre-wrap; }
button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; margin: 5px; }
button:hover { background: #1d4ed8; }
button.danger { background: #dc2626; }
button.danger:hover { background: #b91c1c; }
button.success { background: #16a34a; }
button.success:hover { background: #15803d; }
.success { color: #4ade80; }
.error { color: #f87171; }
.info { color: #38bdf8; }
input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 6px; width: 100%; font-size: 14px; margin-bottom: 10px; }
.log { background: #0f172a; border-radius: 8px; padding: 12px; font-size: 12px; max-height: 400px; overflow-y: auto; font-family: monospace; line-height: 1.5; }
</style>
</head>
<body>
<h1>🔄 Мигратор данных</h1>
<p>Переносит данные из localStorage браузера в ваш аккаунт Firebase.</p>

<div class="card">
    <h2>Шаг 1: Войти в аккаунт</h2>
    <input type="email" id="email" placeholder="Ваш email">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">🔑 Войти</button>
    <div id="login-status"></div>

<div class="card" id="data-card" style="display:none;">
    <h2>Шаг 2: Данные в этом браузере (localStorage)</h2>
    <button onclick="checkLS()">📂 Проверить данные в браузере</button>
    <div id="ls-status"></div>
    <pre id="ls-display" style="display:none;"></pre>
</div>

<div class="card" id="migrate-card" style="display:none;">
    <h2>Шаг 3: Перенести данные в ваш аккаунт</h2>
    <button class="success" onclick="migrateData()">📦 Перенести данные → в Firebase</button>
    <div id="migrate-status"></div>

<div class="card">
    <h2>📋 Лог</h2>
    <div class="log" id="log">Нажмите "Войти" для начала...</div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyDvOH_VAzHBJKeXiZ8adIHsaJ6C3aGurcE",
    authDomain: "diary-51564.firebaseapp.com",
    projectId: "diary-51564",
    storageBucket: "diary-51564.firebasestorage.app",
    messagingSenderId: "1021457298792",
    appId: "1:1021457298792:web:650fe99ac0b7ba234992dd"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var currentUid = null;
var lsData = { nutrition: null, workouts: [], progress: {} };

function log(msg, type) {
    if (!type) type = 'info';
    var el = document.getElementById('log');
    var icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
    var colors = { info: '#38bdf8', success: '#4ade80', error: '#f87171', warning: '#fbbf24' };
    el.innerHTML += '<div style="color:' + (colors[type] || '#94a3b8') + '">' + (icons[type] || '') + ' ' + msg + '</div>';
    el.scrollTop = el.scrollHeight;
}

function login() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn = document.querySelector('button[onclick="login()"]');
    
    log('Вход как ' + email + '...');
    btn.disabled = true;
    btn.textContent = '⏳ Вход...';
    
    firebase.auth().signInWithEmailAndPassword(email, password)
        .then(function(cred) {
            currentUid = cred.user.uid;
            document.getElementById('login-status').innerHTML = '<span class="success">✅ Вход выполнен! UID: ' + currentUid + '</span>';
            document.getElementById('data-card').style.display = 'block';
            document.getElementById('migrate-card').style.display = 'block';
            log('✅ Успешный вход! Ваш UID: ' + currentUid, 'success');
            btn.disabled = false;
            btn.textContent = '🔑 Войти';
        })
        .catch(function(error) {
            document.getElementById('login-status').innerHTML = '<span class="error">❌ ' + error.message + '</span>';
            log('Ошибка: ' + error.message, 'error');
            btn.disabled = false;
            btn.textContent = '🔑 Войти';
        });
}

function checkLS() {
    log('Проверяю localStorage...');
    
    var nutritionRaw = localStorage.getItem('nutrition-data');
    var workoutsRaw = localStorage.getItem('workouts-data');
    var progressRaw = localStorage.getItem('exercise-progress');
    
    var display = document.getElementById('ls-display');
    var output = '';
    
    lsData = { nutrition: null, workouts: [], progress: {} };
    
    try {
        if (nutritionRaw) {
            var parsed = JSON.parse(nutritionRaw);
            if (parsed && parsed.weeks && parsed.weeks.length > 0) {
                lsData.nutrition = parsed;
                output += '📘 ДНЕВНИК ПИТАНИЯ:\n';
                output += '  Недель: ' + parsed.weeks.length + '\n';
                for (var i = 0; i < parsed.weeks.length; i++) {
                    var w = parsed.weeks[i];
                    output += '  • ' + (w.title || w.id) + ': ' + (w.menu ? w.menu.length : 0) + ' дней\n';
                }
                if (parsed.data) {
                    var keys = Object.keys(parsed.data);
                    output += '  Записей данных: ' + keys.length + '\n';
                }
            } else {
                output += '📘 Дневник питания: пусто\n';
            }
        } else {
            output += '📘 Дневник питания: нет в localStorage\n';
        }
    } catch(e) {
        output += '❌ Ошибка парсинга питания: ' + e.message + '\n';
    }
    
    try {
        if (workoutsRaw) {
            var parsed2 = JSON.parse(workoutsRaw);
            if (parsed2 && parsed2.workouts && parsed2.workouts.length > 0) {
                lsData.workouts = parsed2.workouts;
                output += '\n🏋️ ТРЕНИРОВКИ:\n';
                output += '  Тренировок: ' + parsed2.workouts.length + '\n';
            } else {
                output += '\n🏋️ Тренировки: пусто\n';
            }
        } else {
            output += '\n🏋️ Тренировки: нет в localStorage\n';
        }
    } catch(e) {
        output += '\n❌ Ошибка парсинга тренировок: ' + e.message + '\n';
    }
    
    try {
        if (progressRaw) {
            lsData.progress = JSON.parse(progressRaw);
            var exNames = Object.keys(lsData.progress);
            output += '\n📈 Прогресс упражнений: ' + exNames.length + ' упражнений\n';
        }
    } catch(e) {}
    
    if (output === '') output = 'Нет данных в localStorage';
    
    display.textContent = output;
    display.style.display = 'block';
    
    var hasData = lsData.nutrition || lsData.workouts.length > 0;
    if (hasData) {
        document.getElementById('ls-status').innerHTML = '<span class="success">✅ Данные найдены в браузере!</span>';
        log('Данные найдены! Можно переносить.', 'success');
    } else {
        document.getElementById('ls-status').innerHTML = '<span class="warning">⚠️ Данных в браузере нет. Возможно, их нужно вводить заново.</span>';
        log('Данных в браузере нет', 'warning');
    }
}

function migrateData() {
    if (!currentUid) {
        log('Сначала войдите в аккаунт!', 'error');
        return;
    }
    
    var hasData = lsData.nutrition || lsData.workouts.length > 0;
    if (!hasData) {
        // Даже если проверку не нажимали, пробуем прочитать localStorage
        var nutritionRaw = localStorage.getItem('nutrition-data');
        var workoutsRaw = localStorage.getItem('workouts-data');
        var progressRaw = localStorage.getItem('exercise-progress');
        
        try {
            if (nutritionRaw) {
                var p = JSON.parse(nutritionRaw);
                if (p && p.weeks && p.weeks.length > 0) lsData.nutrition = p;
            }
        } catch(e) {}
        try {
            if (workoutsRaw) {
                var p2 = JSON.parse(workoutsRaw);
                if (p2 && p2.workouts) lsData.workouts = p2.workouts;
            }
        } catch(e) {}
        try {
            if (progressRaw) lsData.progress = JSON.parse(progressRaw);
        } catch(e) {}
        
        hasData = lsData.nutrition || lsData.workouts.length > 0;
        if (!hasData) {
            log('Нет данных для переноса. Откройте старый файл index.html в этом же браузере, чтобы данные появились в localStorage', 'error');
            return;
        }
    }
    
    log('Начинаю перенос данных в аккаунт ' + currentUid + '...');
    
    var diaryData = {
        nutrition: lsData.nutrition || { weeks: [], currentWeekId: null },
        workouts: lsData.workouts || [],
        progress: lsData.progress || {},
        migratedFrom: 'localStorage',
        migratedAt: Date.now(),
        lastUpdated: Date.now()
    };
    
    log('📦 Переношу дневник...', 'info');
    
    // Сохраняем в Firebase — у пользователя есть права на свой путь
    db.ref('lera_diary_v1/' + currentUid).set(diaryData)
        .then(function() {
            log('✅ Дневник перенесён!', 'success');
            
            // Пробуем также сохранить finance, если есть ключ finance в localStorage
            var financeRaw = localStorage.getItem('finance-data');
            if (financeRaw) {
                try {
                    var finData = JSON.parse(financeRaw);
                    return db.ref('lera_finance_v1/' + currentUid).set({
                        transactions: finData.transactions || [],
                        savings: finData.savings || [],
                        planned: finData.planned || [],
                        categories: finData.categories || [],
                        migratedFrom: 'localStorage',
                        migratedAt: Date.now(),
                        lastUpdated: Date.now()
                    });
                } catch(e) {
                    log('Нет финансовых данных для переноса', 'info');
                }
            } else {
                log('Нет финансовых данных в localStorage', 'info');
            }
            return Promise.resolve();
        })
        .then(function() {
            log('✅ ВСЕ ДАННЫЕ ПЕРЕНЕСЕНЫ!', 'success');
            document.getElementById('migrate-status').innerHTML = 
                '<div class="success" style="font-size:18px;font-weight:bold;margin-top:10px;">' +
                '✅ Данные перенесены в Firebase!<br>' +
                'Теперь откройте <b>diary-app/index.html</b> и войдите — данные загрузятся из Firebase.</div>';
        })
        .catch(function(error) {
            log('❌ Ошибка: ' + error.message, 'error');
            document.getElementById('migrate-status').innerHTML = '<span class="error">❌ Ошибка: ' + error.message + '</span>';
        });
}
</script>
</body>
</html>
